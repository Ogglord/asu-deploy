version: "3"

services:
  redis:
    image: docker.io/redis/redis-stack-server:latest
    restart: always
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"

  server:
    image: ghcr.io/ogglord/asu:latest
    command: uv run uvicorn --host 0.0.0.0 'asu.main:app'
    restart: always
    env_file: .env
    environment:
      # Shown as the "environment" tag on the landing page; ASU_VERSION is
      # baked into the image at build time (short commit SHA).
      ASU_ENV: prod
    depends_on:
      - redis
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./asu.toml:/app/asu.toml:ro
      # Shared store — worker writes built firmware here, server serves it.
      # Bind-mounted to /tmp so it's visible on the host (tmpfs, so cleared
      # on reboot — fine, ASU regenerates builds on demand).
      - /tmp/asu-public-data:/app/public

  worker:
    image: ghcr.io/ogglord/asu:latest
    command: uv run rqworker --url redis://redis default
    restart: always
    env_file: .env
    environment:
      ASU_ENV: prod
    depends_on:
      - redis
    userns: keep-id
    volumes:
      - ./asu.toml:/app/asu.toml:ro
      # Mount host Podman socket so worker can spawn ImageBuilder containers
      - $CONTAINER_SOCKET_PATH:/var/podman.sock:rw
      - /tmp/asu-public-data:/app/public
    security_opt:
      - label=disable

volumes:
  redis-data:
