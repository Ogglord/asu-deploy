# Dev overlay for podman-compose.yml.
#
# Usage:
#   ./dev-asu.sh
#   # or manually:
#   podman-compose -f podman-compose.yml -f podman-compose.dev.yml up
#
# Builds from the vendored ./asu submodule, bind-mounts source for live
# reload, and routes all keys to Redis DB 1 so prod state (DB 0) is
# untouched and `FLUSHDB` on DB 1 is a safe full reset.

services:
  server:
    build:
      context: ./asu
      dockerfile: Containerfile
    image: asu-dev:latest
    # --log-level debug: uvicorn owns its own loggers (uvicorn.access /
    # uvicorn.error) and ignores ASU's logging.basicConfig level.
    command: uv run uvicorn --host 0.0.0.0 --reload --reload-dir /app/asu --log-level debug asu.main:app
    environment:
      REDIS_URL: redis://redis:6379/1
      LOG_LEVEL: DEBUG
      # Force unbuffered stdout so `podman-compose logs -f` shows output
      # line-by-line instead of holding it in Python's buffer.
      PYTHONUNBUFFERED: "1"
      # Override the prod "prod" label and surface the submodule commit
      # on the landing page. dev-asu.sh exports ASU_VERSION from the
      # ./asu submodule's git state before invoking compose.
      ASU_ENV: dev
      ASU_VERSION: ${ASU_VERSION:-}
    # Podman defaults to the `journald` log driver. Rootless containers
    # write to the *system* journal, which `asu` (not in systemd-journal
    # or adm) can't read — so `podman logs` and `podman-compose logs -f`
    # return empty and dev-asu.log stays silent. `k8s-file` stores logs
    # as files readable by the rootless user, restoring `logs -f` output.
    logging:
      driver: k8s-file
    volumes:
      - ./asu/asu:/app/asu:ro

  worker:
    build:
      context: ./asu
      dockerfile: Containerfile
    image: asu-dev:latest
    # --logging_level DEBUG turns on rq's build/job tracing.
    command: uv run rqworker --logging_level DEBUG --url redis://redis:6379/1 default
    environment:
      REDIS_URL: redis://redis:6379/1
      LOG_LEVEL: DEBUG
      PYTHONUNBUFFERED: "1"
      ASU_ENV: dev
      ASU_VERSION: ${ASU_VERSION:-}
    logging:
      driver: k8s-file
    volumes:
      - ./asu/asu:/app/asu:ro
