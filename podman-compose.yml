version: "3"

services:
  redis:
    image: docker.io/redis/redis-stack-server:latest
    restart: always
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"

  server:
    image: docker.io/openwrt/asu:latest
    command: uv run uvicorn --host 0.0.0.0 'asu.main:app'
    restart: always
    env_file: .env
    depends_on:
      - redis
    ports:
      - "127.0.0.1:8000:8000"

  worker:
    image: docker.io/openwrt/asu:latest
    command: uv run rqworker --url redis://redis default
    restart: always
    env_file: .env
    depends_on:
      - redis
    userns: keep-id
    volumes:
      # Mount host Podman socket so worker can spawn ImageBuilder containers
      - /run/user/1000/podman/podman.sock:/run/podman/podman.sock
    security_opt:
      - label=disable

volumes:
  redis-data:
