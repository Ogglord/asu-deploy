version: "3"

services:
  redis:
    image: docker.io/redis/redis-stack-server:latest
    restart: always
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"

  server:
    image: ghcr.io/ogglord/asu:latest
    command: uv run uvicorn --host 0.0.0.0 'asu.main:app'
    restart: always
    env_file: .env
    depends_on:
      - redis
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./asu.toml:/app/asu.toml:ro

  worker:
    image: ghcr.io/ogglord/asu:latest
    command: uv run rqworker --url redis://redis default
    restart: always
    env_file: .env
    depends_on:
      - redis
    userns: keep-id
    volumes:
      - ./asu.toml:/app/asu.toml:ro
      # Mount host Podman socket so worker can spawn ImageBuilder containers
      - $CONTAINER_SOCKET_PATH:/var/podman.sock:rw
    security_opt:
      - label=disable

volumes:
  redis-data:
